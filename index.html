<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Crypto Reward | Unlock Your Match</title>
    <style>
        /* বেসিক রিসেট ও ফুল স্ক্রিন সেটআপ */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            color: #f3f4f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* ফুল স্ক্রিন ব্যাকগ্রাউন্ড স্লাইডশো এরিয়া */
        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        /* ব্যাকগ্রাউন্ড ইমেজের স্টাইল */
        .bg-pic {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        
        .bg-pic.active-bg {
            opacity: 1;
        }

        /* ব্যাকগ্রাউন্ড ক্লিয়ার রাখার জন্য হালকা ওভারলে */
        .bg-slider::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25); 
        }
        
        /* 💡 মেইন কার্ড কন্টেইনার (বক্সের ব্যাকগ্রাউন্ড কালার পরিবর্তন করা হয়েছে) */
        /* rgba(10, 15, 30, 0.3) ব্যবহার করায় বক্সটি এখন স্বচ্ছ দেখাবে এবং পিছনের ছবি ৭০% দৃশ্যমান হবে */
        .promo-card { 
            background: rgba(10, 15, 30, 0.3); 
            max-width: 480px; 
            width: 100%; 
            border-radius: 24px; 
            padding: 35px 25px; 
            text-align: center; 
            border: 1px solid rgba(236, 72, 153, 0.4); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px); /* পিছনের ছবি স্পষ্ট দেখানোর জন্য ব্লার কমানো হয়েছে */
            z-index: 1;
        }

        /* ভেরিфাইড অফার ব্যাজ */
        .bonus-badge {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
            color: #000;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.5);
            letter-spacing: 1px;
        }
        
        /* মেইন হেডিং */
        h1 {
            font-size: 26px;
            line-height: 1.35;
            margin-bottom: 15px;
            color: #ffffff;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* $100 Crypto লেখার আকর্ষণীয় আল্ট্রা-ব্রাইট গোল্ডেন নিয়ন কালার */
        .highlight-gold {
            color: #fffb00;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(255, 251, 0, 0.65), 0 0 20px rgba(249, 115, 22, 0.4);
            background: linear-gradient(135deg, #fffb00 0%, #ff9100 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* সাব-টেক্সট */
        .sub-text {
            font-size: 18px;
            color: #e5e7eb;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        /* অ্যানিমেটেড বাটন (Unlock Match) */
        .btn-claim {
            display: inline-block;
            width: 100%;
            background: linear-gradient(135deg, #ec4899 0%, #be185d 50%, #f43f5e 100%);
            color: white;
            border: none;
            padding: 18px 25px;
            font-size: 20px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
            transition: all 0.3s ease;
            animation: pulseGlow 1.5s infinite alternate, wobbleShake 3s infinite ease-in-out;
            margin-bottom: 25px;
        }
        
        .btn-claim:hover {
            background: linear-gradient(135deg, #f43f5e 0%, #ec4899 100%);
            box-shadow: 0 0 35px rgba(236, 72, 153, 0.9);
            transform: scale(1.05);
        }

        /* প্রিমিয়াম কাউন্টডাউন টাইমার স্টাইল */
        .timer-container {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 12px;
            margin-top: 5px;
        }
        .timer-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #9ca3af;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .timer-display {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .timer-block {
            background: #1f2937;
            padding: 6px 10px;
            border-radius: 8px;
            min-width: 55px;
            border-bottom: 2px solid #ef4444;
        }
        .timer-num {
            font-size: 18px;
            font-weight: 800;
            color: #ef4444;
            font-family: monospace, sans-serif;
        }
        .timer-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #9ca3af;
            margin-top: 2px;
        }

        /* অ্যানিমেশনসমূহ */
        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
            100% { transform: scale(1.03); box-shadow: 0 0 30px rgba(236, 72, 153, 0.8), 0 0 15px rgba(244, 63, 94, 0.4); }
        }

        @keyframes wobbleShake {
            0%, 100%, 80% { transform: rotate(0deg); }
            85% { transform: rotate(-2deg); }
            90% { transform: rotate(2deg); }
            95% { transform: rotate(-2deg); }
        }

        /* রেসপন্সিভ মোবাইল অপ্টিমাইজেশন */
        @media (max-width: 400px) {
            h1 { font-size: 22px; }
            .sub-text { font-size: 16px; }
            .btn-claim { font-size: 17px; padding: 15px 20px; }
            .promo-card { padding: 25px 15px; }
            .timer-block { min-width: 45px; padding: 4px 6px; }
            .timer-num { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="bg-slider">
        <img src="cx1.webp" alt="Background 1" class="bg-pic active-bg">
        <img src="cx2.webp" alt="Background 2" class="bg-pic">
        <img src="cx3.webp" alt="Background 3" class="bg-pic">
    </div>

    <div class="promo-card">
        <div class="bonus-badge">Verified Offer</div>
        
        <h1>Match with Someone Right Now & Get <span class="highlight-gold">$100 Crypto</span> Instantly in Your Wallet!</h1>
        
        <p class="sub-text">Unlock Your Match Now!</p>
        
        <a href="https://paysale.g2afse.com/click?pid=125904&offer_id=10417&sub1=P1" class="btn-claim" target="_blank">
            Unlock Match & Win $100
        </a>

        <div class="timer-container">
            <div class="timer-title">Limited Time Offer Ending In</div>
            <div class="timer-display">
                <div class="timer-block">
                    <div class="timer-num" id="days">00</div>
                    <div class="timer-label">Days</div>
                </div>
                <div class="timer-block">
                    <div class="timer-num" id="hours">04</div>
                    <div class="timer-label">Hours</div>
                </div>
                <div class="timer-block">
                    <div class="timer-num" id="minutes">37</div>
                    <div class="timer-label">Min</div>
                </div>
                <div class="timer-block">
                    <div class="timer-num" id="seconds">00</div>
                    <div class="timer-label">Sec</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ব্যাকগ্রাউন্ড ইমেজ অনবরত চেঞ্জ করার জাভাস্ক্রিপ্ট কোড
        let currentBgIndex = 0;
        const bgImages = document.querySelectorAll('.bg-pic');
        const totalBgImages = bgImages.length;

        function autoBackgroundSlider() {
            bgImages[currentBgIndex].classList.remove('active-bg');
            currentBgIndex = (currentBgIndex + 1) % totalBgImages;
            bgImages[currentBgIndex].classList.add('active-bg');
        }
        setInterval(autoBackgroundSlider, 3000);

        // ৪ ঘণ্টা ৩৭ মিনিটের নিখুঁত কাউন্টডাউন টাইমার জাভাস্ক্রিপ্ট কোড
        const totalSeconds = (4 * 60 * 60) + (37 * 60); 
        let timeRemaining = totalSeconds;

        const daysElement = document.getElementById('days');
        const hoursElement = document.getElementById('hours');
        const minutesElement = document.getElementById('minutes');
        const secondsElement = document.getElementById('seconds');

        function updateCountdown() {
            if (timeRemaining <= 0) {
                daysElement.textContent = "00";
                hoursElement.textContent = "00";
                minutesElement.textContent = "00";
                secondsElement.textContent = "00";
                return;
            }

            const d = 0;
            const h = Math.floor((timeRemaining % (24 * 3600)) / 3600);
            const m = Math.floor((timeRemaining % 3600) / 60);
            const s = Math.floor(timeRemaining % 60);

            daysElement.textContent = "00";
            hoursElement.textContent = h < 10 ? "0" + h : h;
            minutesElement.textContent = m < 10 ? "0" + m : m;
            secondsElement.textContent = s < 10 ? "0" + s : s;

            timeRemaining--;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
